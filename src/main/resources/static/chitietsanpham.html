<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Chi tiết sản phẩm</title>
    <link rel="shortcut icon" href="/img/favicon.ico" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
        crossorigin="anonymous">

    <!-- Owl Carousel -->
    <link rel="stylesheet" href="/js/owlcarousel/owl.carousel.min.css">
    <link rel="stylesheet" href="/js/owlcarousel/owl.theme.default.min.css">
    <script src="/js/Jquery/Jquery.min.js"></script>
    <script src="/js/owlcarousel/owl.carousel.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/topnav.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/chitietsanpham.css">
    <link rel="stylesheet" href="/css/footer.css">
</head>

<body>
    <script> addTopNav(); </script>

    <section>
        <script> addHeader(); </script>

        <div id="productNotFound" style="min-height: 50vh; text-align: center; margin: 50px; display: none;">
            <h1 style="color: red; margin-bottom: 10px;">Không tìm thấy sản phẩm</h1>
            <a href="/index.html" style="text-decoration: underline;">Quay lại trang chủ</a>
        </div>

        <div class="chitietSanpham" style="margin-bottom: 100px; display:none">
            <h1 id="productName">Tên sản phẩm</h1>
            <div class="rowdetail group">
                <div class="picture">
                    <img id="mainImage" src="" alt="" onclick="opencertain()">
                </div>
                <div class="price_sale">
                    <div class="area_price" id="productPrice"></div>
                    <div class="so_luong" id="productQuantity"></div>
                    <div class="area_order">
                        <a class="buy_now" id="btnAddToCart">
                            <b><i class="fa fa-cart-plus"></i> Thêm vào giỏ hàng</b>
                            <p>Giao nhanh hoặc nhận tại cửa hàng</p>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        async function loadProductDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get("id");

            if (!id) {
                document.getElementById("productNotFound").style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`/san-pham/api/${id}`);
                if (!res.ok) throw new Error("Không tìm thấy sản phẩm");

                const data = await res.json();

                document.getElementById("productName").textContent = data.ten;
                document.getElementById("productPrice").innerHTML = `<strong>Giá:</strong> ${data.giaBan?.toLocaleString('vi-VN')}₫`;
                document.getElementById("productQuantity").innerHTML = `<strong>Số lượng còn lại:</strong> ${data.soLuongTon || 'Không rõ'}`;

                if (data.hinhAnhUrls && data.hinhAnhUrls.length > 0) {
                    document.getElementById("mainImage").src = `/uploads/images/${data.hinhAnhUrls[0]}`;
                } else {
                    document.getElementById("mainImage").src = "/img/default.jpg";
                }

                document.getElementById("btnAddToCart").onclick = () => themVaoGioHang(id);
                document.querySelector(".chitietSanpham").style.display = 'block';

            } catch (err) {
                console.error(err);
                document.getElementById("productNotFound").style.display = 'block';
            }
        }

        loadProductDetail();
    </script>

    <script>addContainTaiKhoan();</script>
    <div class="footer"><script>addFooter();</script></div>
</body>

</html>
